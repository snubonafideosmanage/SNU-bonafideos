<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>반듯한정형외과 환자 안내</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      background:linear-gradient(135deg,#8a7968 0%,#6b5d50 100%);
      min-height:100vh;
      padding:20px;
    }

    .container{max-width:1280px;margin:0 auto;}

    header{
      text-align:center;color:#fff;margin-bottom:24px;padding:38px 20px;
      backdrop-filter:blur(10px);
      background:rgba(255,255,255,0.10);
      border-radius:25px;
      box-shadow:0 8px 32px rgba(0,0,0,0.2);
    }
    header h1{font-size:2.3em;margin-bottom:10px;text-shadow:3px 3px 6px rgba(0,0,0,0.3);letter-spacing:2px;}
    header p{font-size:1.1em;opacity:0.95;font-weight:300;}

    .nav-buttons{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      max-width:980px;
      margin:0 auto;
    }

    .nav-item{display:block;}
    .nav-item.full-width{grid-column:1 / -1;}

    .nav-btn{
      width:100%;
      background:linear-gradient(135deg,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0.90) 100%);
      color:#6b5d50;border:none;
      padding:18px 14px;border-radius:16px;
      font-size:0.96em;font-weight:800;
      cursor:pointer;transition:all .25s ease;
      box-shadow:0 6px 20px rgba(0,0,0,0.15);
      text-align:center;position:relative;overflow:hidden;
    }
    .nav-btn::before{
      content:'';position:absolute;top:0;left:-100%;
      width:100%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);
      transition:left .45s;
    }
    .nav-btn:hover::before{left:100%;}
    .nav-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,0.25);}
    .nav-btn.active{
      background:linear-gradient(135deg,#6b5d50 0%,#5a4d40 100%);
      color:#fff;
      box-shadow:0 10px 28px rgba(107,93,80,0.45);
    }

    /* ── 서브메뉴 ── */
    .sub-menu{
      display:none;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
      padding:10px 0 2px 0;
    }
    .sub-menu.open{display:grid;}

    .sub-btn{
      width:100%;
      background:linear-gradient(135deg,rgba(255,255,255,0.82) 0%,rgba(245,241,237,0.88) 100%);
      color:#6b5d50;
      border:2px solid rgba(107,93,80,0.18);
      padding:13px 8px;border-radius:12px;
      font-size:0.87em;font-weight:700;
      cursor:pointer;transition:all .22s ease;
      box-shadow:0 3px 10px rgba(0,0,0,0.09);
      text-align:center;
      position:relative;overflow:hidden;
    }
    .sub-btn::before{
      content:'';position:absolute;top:0;left:-100%;
      width:100%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.30),transparent);
      transition:left .4s;
    }
    .sub-btn:hover::before{left:100%;}
    .sub-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,0.17);}
    .sub-btn.active{
      background:linear-gradient(135deg,#8a7968 0%,#6b5d50 100%);
      color:#fff;
      border-color:transparent;
      box-shadow:0 6px 16px rgba(107,93,80,0.38);
    }
    /* ── /서브메뉴 ── */

    .inline-viewer{
      grid-column:1 / -1;
      width:100%;
      border-radius:22px;
      overflow:hidden;
      background:linear-gradient(135deg,rgba(255,255,255,0.98) 0%,rgba(248,249,250,0.95) 100%);
      box-shadow:0 14px 40px rgba(0,0,0,0.22);
      animation:drop .22s ease;
    }
    @keyframes drop{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}

    .inline-viewer-inner{padding:14px;}

    .inline-viewer-head{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:6px 4px 12px 4px;
    }
    .inline-viewer-title{
      color:#6b5d50;font-size:1.25em;font-weight:900;letter-spacing:.2px;line-height:1.2;
    }
    .inline-viewer-close{
      border:none;
      border-radius:999px;
      width:40px;height:40px;
      display:inline-flex;align-items:center;justify-content:center;
      background:#6b5d50;color:#fff;
      font-weight:900;font-size:18px;line-height:1;
      cursor:pointer;flex-shrink:0;
    }

    .inline-viewer-img{
      width:100%;height:auto;max-height:none;
      object-fit:contain;border-radius:16px;
      background:#fff;
      box-shadow:0 10px 28px rgba(0,0,0,0.18);
      display:block;
    }

    .slider-wrap{
      position:relative;overflow:hidden;border-radius:16px;background:#fff;
      box-shadow:0 10px 28px rgba(0,0,0,0.18);
    }
    .slider-track{
      display:flex;transition:transform .3s ease;
    }
    .slider-track img{
      width:100%;flex-shrink:0;display:block;border-radius:16px;
    }
    .slider-arrow{
      position:absolute;top:50%;transform:translateY(-50%);
      background:rgba(107,93,80,0.82);color:#fff;border:none;
      width:42px;height:42px;border-radius:50%;font-size:20px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      z-index:10;transition:background .2s;
    }
    .slider-arrow:hover{background:rgba(107,93,80,1);}
    .slider-arrow.left{left:10px;}
    .slider-arrow.right{right:10px;}
    .slider-dots{
      display:flex;justify-content:center;gap:8px;padding:10px 0 4px;
    }
    .slider-dot{
      width:10px;height:10px;border-radius:50%;
      background:rgba(107,93,80,0.25);border:none;cursor:pointer;padding:0;
      transition:background .2s;
    }
    .slider-dot.active{background:#6b5d50;}

    footer{
      text-align:center;color:#fff;padding:34px 20px;margin-top:30px;
      backdrop-filter:blur(10px);
      background:rgba(255,255,255,0.1);
      border-radius:25px;
      box-shadow:0 8px 32px rgba(0,0,0,0.2);
      max-width:1280px;margin-left:auto;margin-right:auto;
    }
    footer p{opacity:0.95;margin:8px 0;font-size:1em;line-height:1.6;}

    @media(max-width:768px){
      body{padding:14px;}
      header{padding:30px 16px;}
      header h1{font-size:1.9em;}
      .nav-btn{padding:16px 10px;font-size:0.88em;border-radius:14px;}
      .inline-viewer-title{font-size:1.08em;}
      .inline-viewer-img{max-height:calc(100vh - 240px);}
      .sub-btn{padding:11px 6px;font-size:0.82em;}
    }
    @media(max-width:420px){
      .nav-btn{font-size:0.84em;padding:15px 9px;}
      .inline-viewer-img{max-height:calc(100vh - 225px);}
      .sub-btn{font-size:0.78em;padding:10px 5px;}
    }
  </style>
</head>

<body>

    <header>

      <p>환자 안내문</p>
    </header>

    <div class="nav-buttons" id="navGrid">

      <div class="nav-item full-width">
        <button class="nav-btn" data-title="💉 주사치료 후 주의사항" data-img="주사치료후주의사항.png" onclick="openInlineViewer(this)">

      <div class="nav-item">
        <button class="nav-btn" data-title="📋 신경차단술이란?" data-img="뼈주사.png" onclick="openInlineViewer(this)">

        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="💡 신경차단술에 대한 오해와 진실" data-img="신경차단술.png" onclick="openInlineViewer(this)">
          💡 신경차단술에 대한 오해와 진실
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="💉 연골주사 안내문" data-img="연골주사안내.png" onclick="openInlineViewer(this)">
          💉 연골주사 안내문

      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="💊 투약안내문" data-img="투약안내문2.png" onclick="openInlineViewer(this)">
          💊 투약안내문
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="🍽️ 통풍 식이요법" data-img="통풍안내문.png" onclick="openInlineViewer(this)">
          🍽️ 통풍 식이요법
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="🔥 온찜질은 얼마나 해야 하나요?" data-img="온찜질시행횟수.png" onclick="openInlineViewer(this)">

        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" onclick="window.open('https://snubonafideosmanage.github.io/stretch/', '_blank')">
          🧘 스트레칭 어떻게 해야 좋을까요?
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="❓ 치료 언제까지 해야 하나요?" data-img="치료지속여부안내.png" onclick="openInlineViewer(this)">
          ❓ 치료 언제까지 해야 하나요?
        </button>
      </div>

      <!-- ★ 손상단계별 치료안내 (서브메뉴) ★ -->
      <div class="nav-item">
        <button class="nav-btn has-sub" onclick="toggleSubMenu('body', this)">
          🦴 손상단계별 치료안내 ▾
        </button>
        <div class="sub-menu" id="sub-body">
          <button class="sub-btn" data-title="목" data-img="목.png" onclick="openInlineViewer(this)">목</button>
          <button class="sub-btn" data-title="어깨" data-img="어깨.png" onclick="openInlineViewer(this)">어깨</button>
          <button class="sub-btn" data-title="팔꿈치" data-img="팔꿈치.png" onclick="openInlineViewer(this)">팔꿈치</button>
          <button class="sub-btn" data-title="손목" data-img="손목.png" onclick="openInlineViewer(this)">손목</button>
          <button class="sub-btn" data-title="손가락" data-img="손가락.png" onclick="openInlineViewer(this)">손가락</button>
          <button class="sub-btn" data-title="허리" data-img="허리.png" onclick="openInlineViewer(this)">허리</button>
          <button class="sub-btn" data-title="고관절" data-img="고관절.png" onclick="openInlineViewer(this)">고관절</button>
          <button class="sub-btn" data-title="무릎" data-img="무릎.png" onclick="openInlineViewer(this)">무릎</button>
          <button class="sub-btn" data-title="발목" data-img="발목.png" onclick="openInlineViewer(this)">발목</button>
          <button class="sub-btn" data-title="발가락" data-img="발가락.png" onclick="openInlineViewer(this)">발가락</button>
        </div>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="🦶 족저근막염 치료 안내" data-img="족저근막염.png" onclick="openInlineViewer(this)">
          🦶 족저근막염 치료 안내
        </button>
      </div>

      <!-- ★ 보조기 착용 안내 (서브메뉴) ★ -->
      <div class="nav-item">
        <button class="nav-btn has-sub" onclick="toggleSubMenu('brace', this)">
          🩹 보조기 착용 안내 ▾
        </button>
        <div class="sub-menu" id="sub-brace">
          <button class="sub-btn" data-title="🩹 쿨밴드·코반 착용 후 붓기 관리" data-img="쿨밴드코반붓기관리.png" onclick="openInlineViewer(this)">쿨밴드·코반 착용 후 붓기 관리</button>
          <button class="sub-btn" data-title="붕대 및 코반 착용법" data-img="IMG_7542.MOV" onclick="openInlineViewer(this)">붕대 및 코반 착용법</button>
        </div>
      </div>

      <!-- ★ 특수 치료 안내 (서브메뉴) ★ -->
      <div class="nav-item">
        <button class="nav-btn has-sub" onclick="toggleSubMenu('special', this)">
          ⭐ 특수 치료 안내 ▾
        </button>
        <div class="sub-menu" id="sub-special">
          <button class="sub-btn" data-title="🧊 신장분사치료" data-img="cryo.png" onclick="openInlineViewer(this)">🧊 신장분사치료</button>
          <button class="sub-btn" data-title="👐 도수치료" data-img="도수.png" onclick="openInlineViewer(this)">👐 도수치료</button>
          <button class="sub-btn" data-title="💡 고출력레이저치료" data-img="레이저.png" onclick="openInlineViewer(this)">💡 고출력레이저치료</button>
          <button class="sub-btn" data-title="🔊 충격파치료" data-img="충격파.png" onclick="openInlineViewer(this)">🔊 충격파치료</button>
        </div>
      </div>

      <div class="nav-item">
        <button class="nav-btn" onclick="openSliderViewer(this, '💰 비급여 항목 안내', ['비급여항목안내 (1).png','비급여항목안내 (2).png'])">
          💰 비급여 항목 안내
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="📄 서류 비용 안내" data-img="원내서류안내_A4.png" onclick="openInlineViewer(this)">
          📄 서류 비용 안내
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-title="📱 카카오톡 채널 추가 방법" data-img="카톡채널추가방법.png" onclick="openInlineViewer(this)">
          📱 안내문을 나중에도 확인하고 싶어요
        </button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" onclick="window.open('http://pf.kakao.com/_xikLxcxj', '_blank')">
          💬 카카오톡 채널 추가하러 가기
        </button>
      </div>

    </div>

    <footer>
      <p><strong>반듯한정형외과 | Bonafide Orthopedic Clinic</strong></p>
      <p>궁금하신 사항은 직원에게 언제든지 문의해주세요.</p>
      <p>📞 TEL : 02-875-7590</p>
    </footer>
  </div>

  <script>
    let currentViewer    = null;
    let currentSubMenuEl  = null;
    let currentSubMenuBtn = null;

    /* 인라인 뷰어만 닫기 (서브메뉴 열림 상태는 유지) */
    function closeInlineViewer(){
      if(currentViewer){
        currentViewer.remove();
        currentViewer = null;
      }
      /* has-sub 버튼(서브메뉴 토글 버튼)의 active는 toggleSubMenu 에서 관리하므로 제외 */
      document.querySelectorAll('.nav-btn:not(.has-sub), .sub-btn').forEach(b => b.classList.remove('active'));
    }

    /* 서브메뉴 열기/닫기 */
    function toggleSubMenu(id, btn){
      const sub    = document.getElementById('sub-' + id);
      const isOpen = sub.classList.contains('open');

      /* 다른 서브메뉴가 열려 있으면 먼저 닫기 */
      if(currentSubMenuEl && currentSubMenuEl !== sub){
        currentSubMenuEl.classList.remove('open');
        if(currentSubMenuBtn) currentSubMenuBtn.classList.remove('active');
        closeInlineViewer();
        currentSubMenuEl  = null;
        currentSubMenuBtn = null;
      }

      if(isOpen){
        sub.classList.remove('open');
        btn.classList.remove('active');
        closeInlineViewer();
        currentSubMenuEl  = null;
        currentSubMenuBtn = null;
      } else {
        sub.classList.add('open');
        btn.classList.add('active');
        currentSubMenuEl  = sub;
        currentSubMenuBtn = btn;
      }
    }

    /* 슬라이더 뷰어 열기 */
    function openSliderViewer(button, title, images){
      if(button.classList.contains('active')){
        closeInlineViewer();
        if(currentSubMenuBtn) currentSubMenuBtn.classList.add('active');
        return;
      }
      closeInlineViewer();
      button.classList.add('active');
      if(currentSubMenuBtn) currentSubMenuBtn.classList.add('active');

      let idx = 0;

      const imgsHtml = images.map(src =>
        `<img src="${encodeURI(src)}" alt="${escapeHtml(title)}" loading="lazy">`
      ).join('');

      const dotsHtml = images.map((_,i) =>
        `<button class="slider-dot${i===0?' active':''}" onclick="slideTo(${i})"></button>`
      ).join('');

      const viewer = document.createElement('div');
      viewer.className = 'inline-viewer';
      viewer.id = 'sliderViewer';
      viewer.innerHTML = `
        <div class="inline-viewer-inner">
          <div class="inline-viewer-head">
            <div class="inline-viewer-title">${escapeHtml(title)}</div>
            <button class="inline-viewer-close" type="button" onclick="closeInlineViewerKeepSub()">×</button>
          </div>
          <div class="slider-wrap">
            <button class="slider-arrow left" onclick="slideBy(-1)">&#8592;</button>
            <div class="slider-track" id="sliderTrack">${imgsHtml}</div>
            <button class="slider-arrow right" onclick="slideBy(1)">&#8594;</button>
          </div>
          <div class="slider-dots" id="sliderDots">${dotsHtml}</div>
        </div>
      `;

      const navItem = button.closest('.nav-item');
      navItem.insertAdjacentElement('afterend', viewer);
      currentViewer = viewer;

      window._sliderCount = images.length;
      window._sliderIdx   = 0;

      setTimeout(() => viewer.scrollIntoView({ behavior:'smooth', block:'nearest' }), 50);
    }

    function slideTo(i){
      const track = document.getElementById('sliderTrack');
      const dots  = document.querySelectorAll('.slider-dot');
      if(!track) return;
      window._sliderIdx = i;
      track.style.transform = `translateX(-${i * 100}%)`;
      dots.forEach((d,j) => d.classList.toggle('active', j===i));
    }

    function slideBy(dir){
      const count = window._sliderCount || 1;
      const next  = ((window._sliderIdx || 0) + dir + count) % count;
      slideTo(next);
    }

    /* 이미지 인라인 뷰어 열기 */
    function openInlineViewer(button){
      const title = button.dataset.title || '';
      const src   = button.dataset.img   || '';

      if(button.classList.contains('active')){
        closeInlineViewer();
        /* 서브메뉴 버튼이면 닫힌 후에도 서브메뉴 헤더 active 복원 */
        if(currentSubMenuBtn) currentSubMenuBtn.classList.add('active');
        return;
      }

      closeInlineViewer();
      button.classList.add('active');

      /* 서브메뉴 헤더 버튼 active 유지 */
      if(currentSubMenuBtn) currentSubMenuBtn.classList.add('active');

      const isVideo = /\.(mp4|mov|webm|ogg)$/i.test(src);
      const mediaHtml = isVideo
        ? `<video class="inline-viewer-img" src="${encodeURI(src)}" controls playsinline style="background:#000;"></video>`
        : `<img class="inline-viewer-img" src="${encodeURI(src)}" alt="${escapeHtml(title)}">`;

      const viewer = document.createElement('div');
      viewer.className = 'inline-viewer';
      viewer.innerHTML = `
        <div class="inline-viewer-inner">
          <div class="inline-viewer-head">
            <div class="inline-viewer-title">${escapeHtml(title)}</div>
            <button class="inline-viewer-close" type="button" onclick="closeInlineViewerKeepSub()">×</button>
          </div>
          ${mediaHtml}
        </div>
      `;

      const navItem = button.closest('.nav-item');
      navItem.insertAdjacentElement('afterend', viewer);
      currentViewer = viewer;

      setTimeout(() => viewer.scrollIntoView({ behavior:'smooth', block:'nearest' }), 50);
    }

    /* × 버튼 전용: 뷰어만 닫고 서브메뉴 헤더 active 복원 */
    function closeInlineViewerKeepSub(){
      closeInlineViewer();
      if(currentSubMenuBtn) currentSubMenuBtn.classList.add('active');
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#039;');
    }
  </script>
</body>
</html>
